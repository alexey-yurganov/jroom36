services:
  jroom36:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: jroom36:latest
    container_name: jroom36-app
    ports:
      - "${JROOM36_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-docker}
      - SERVER_PORT=8080
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - jroom36-network

networks:
  jroom36-network:
    driver: bridge