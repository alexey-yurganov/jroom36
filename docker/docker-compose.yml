services:
  postgres:
    image: postgres:18.3-alpine
    container_name: jroom36-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME:-jroom36}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jroom36-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DB_NAME:-jroom36}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - postgres
      - datasources
      - full

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: jroom36:latest
    container_name: jroom36-app
    ports:
      - "${JROOM36_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE:-docker}
      - SERVER_PORT=8080
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - jroom36-network
    profiles:
      - app
      - full

networks:
  jroom36-network:
    name: jroom36-network
    driver: bridge

volumes:
  postgres_data:
    name: jroom36_postgres_data