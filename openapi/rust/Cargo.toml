[package]
name = "jroom36-rust-openapi-client"
version = "0.1.0"
edition = "2021"
description = "Auto-generated OpenAPI client for jroom36 backend"
authors = ["Alexey Y<jroom36@gmail.com>"]
license = "MIT"

[dependencies]
anyhow = "1.0"
reqwest = { version = "0.12", features = ["json", "multipart", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
validator = { version = "0.19", features = ["derive"] }
url = "2.5"

chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.0", features = ["rt", "macros"] }

[dev-dependencies]
wiremock = "0.6"
futures = "0.3"
